<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sentiment Analysis Web App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;

    background:
    radial-gradient(circle at top left,#5b21b6,#111827),
    radial-gradient(circle at bottom right,#06b6d4,#111827);
}

body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#7c3aed;
    border-radius:50%;
    filter:blur(120px);
    top:-100px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#06b6d4;
    border-radius:50%;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
}

.container{
    position:relative;
    width:650px;
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    z-index:10;
}

.logo{
    font-size:55px;
    text-align:center;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}

h1{
    text-align:center;
    margin-top:10px;
    font-weight:700;

    background:linear-gradient(
        90deg,
        #8b5cf6,
        #06b6d4
    );

    background-clip:text;
    -webkit-background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-top:10px;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:170px;
    resize:none;
    border:none;
    outline:none;
    border-radius:18px;
    padding:20px;
    font-size:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.12);
}

textarea::placeholder{
    color:#cbd5e1;
}

.counter{
    text-align:right;
    color:#cbd5e1;
    margin-top:8px;
    font-size:13px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:17px;
    font-weight:600;
    color:white;
    cursor:pointer;

    background:linear-gradient(
        135deg,
        #8b5cf6,
        #06b6d4
    );

    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(6,182,212,.4);
}

.loader{
    display:none;
    margin:20px auto;
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,.3);
    border-top:4px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.result-card{
    margin-top:25px;
    padding:20px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    text-align:center;
    color:white;
    animation:fadeIn .5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.sentiment{
    font-size:28px;
    font-weight:700;
    margin-top:15px;
}

.positive{
    color:#22c55e;
}

.negative{
    color:#ef4444;
}

.neutral{
    color:#facc15;
}

@media(max-width:768px){

    .container{
        width:95%;
        padding:25px;
    }

    h1{
        font-size:28px;
    }

    textarea{
        height:140px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🧠</div>

    <h1>Sentiment Analysis Web App</h1>

    <p class="subtitle">
        Analyze the emotions and sentiments from text instantly
    </p>

    <form method="POST">

        {% csrf_token %}

        <textarea
            id="textInput"
            name="text"
            placeholder="Type a review, message, tweet, or any sentence...">{{ text }}</textarea>

        <div class="counter">
            <span id="charCount">0</span> characters
        </div>

        <button type="submit">
            Analyze Sentiment
        </button>

        <div class="loader" id="loader"></div>

    </form>

    {% if sentiment %}
    <div class="result-card">

        <h3>Analysis Result</h3>

        <div class="sentiment

        {% if sentiment == 'Positive' %}
            positive
        {% elif sentiment == 'Negative' %}
            negative
        {% else %}
            neutral
        {% endif %}

        ">
            {{ sentiment }}

            {% if sentiment == "Positive" %}
                😊
            {% elif sentiment == "Negative" %}
                😞
            {% else %}
                😐
            {% endif %}

        </div>

    </div>
    {% endif %}

</div>

<script>

const textInput = document.getElementById("textInput");
const charCount = document.getElementById("charCount");

charCount.textContent = textInput.value.length;

textInput.addEventListener("input", () => {
    charCount.textContent = textInput.value.length;
});

const form = document.querySelector("form");
const loader = document.getElementById("loader");

form.addEventListener("submit", () => {
    loader.style.display = "block";
});

</script>

</body>
</html>
